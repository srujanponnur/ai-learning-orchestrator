# AI-engineering concept graph (the DAG the curriculum spirals through).
# mastery: 0 unseen · 1 introduced · 2 applied once · 3 reused in a harder context · 4 fluent/can-teach.
# A concept only climbs to 3–4 by REappearing in later units — depth comes from reuse, not one pass.
# Start assumption: solid general SWE, light hands-on LLM/agent work.

concepts:
  # --- io ---
  - { id: prompt-fundamentals,      name: Prompting fundamentals,        domain: io,            tier: foundational, prerequisites: [],                                  mastery: 0 }
  - { id: structured-outputs,       name: Structured outputs,            domain: io,            tier: foundational, prerequisites: [prompt-fundamentals],              mastery: 0 }
  - { id: streaming,                name: Streaming,                     domain: io,            tier: foundational, prerequisites: [prompt-fundamentals],              mastery: 0 }

  # --- tools ---
  - { id: function-calling,         name: Function / tool calling,       domain: tools,         tier: foundational, prerequisites: [structured-outputs],               mastery: 0 }
  - { id: tool-design,              name: Tool-surface design,           domain: tools,         tier: intermediate, prerequisites: [function-calling],                mastery: 0 }
  - { id: mcp,                      name: MCP servers,                   domain: tools,         tier: intermediate, prerequisites: [tool-design],                     mastery: 0 }
  - { id: programmatic-tool-calling, name: Programmatic tool calling,    domain: tools,         tier: advanced,     prerequisites: [tool-design, agent-loop],          mastery: 0 }

  # --- orchestration ---
  - { id: agent-loop,               name: Agent loop,                    domain: orchestration, tier: foundational, prerequisites: [function-calling],                mastery: 0 }
